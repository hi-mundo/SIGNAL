<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">SIGNAL Wall of Understanding</title>
  <desc id="desc">A flow showing SIGNAL interpreting messy input and improving the AI output.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#242424"/>
    </marker>
    <style>
      .bg { fill: #f6f6f2; }
      .title { fill: #202020; font: 800 44px Inter, ui-sans-serif, system-ui, sans-serif; }
      .subtitle { fill: #595959; font: 500 21px Inter, ui-sans-serif, system-ui, sans-serif; }
      .panel-title { fill: #202020; font: 800 22px Inter, ui-sans-serif, system-ui, sans-serif; }
      .panel { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .input { fill: #fff6df; stroke: #705215; stroke-width: 2; }
      .output { fill: #dfeee7; stroke: #1f5137; stroke-width: 2; }
      .signal { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .formula { fill: #efefea; stroke: #222; stroke-width: 2; }
      .label { fill: #202020; font: 800 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .body { fill: #555; font: 500 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .body-dark { fill: #202020; font: 600 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #555; font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; }
      .mono { fill: #202020; font: 700 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .line { stroke: #242424; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #777; stroke-width: 2; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1440" height="820"/>

  <text class="title" x="720" y="66" text-anchor="middle">Wall of Understanding</text>
  <text class="subtitle" x="720" y="104" text-anchor="middle">SIGNAL interprets what enters and improves what leaves the AI experience.</text>

  <g transform="translate(72 160)">
    <rect class="panel" x="0" y="0" width="332" height="500" rx="10"/>
    <text class="panel-title" x="34" y="44">What enters</text>
    <text class="body" x="34" y="76">User language and product context are rarely clean.</text>

    <rect class="input" x="34" y="112" width="264" height="288" rx="8"/>
    <text class="label" x="166" y="150" text-anchor="middle">Messy input</text>
    <text class="body-dark" x="62" y="190">vague request</text>
    <text class="body-dark" x="62" y="226">missing state</text>
    <text class="body-dark" x="62" y="262">unclear risk</text>
    <text class="body-dark" x="62" y="298">hidden evidence</text>
    <text class="body-dark" x="62" y="334">user frustration</text>
    <text class="body-dark" x="62" y="370">ambiguous action</text>

    <text class="small" x="34" y="446">Without interpretation, the user pays the cost:</text>
    <text class="small" x="34" y="472">guessing, repeating, repairing, and trusting.</text>
  </g>

  <path class="line" d="M420 410 H506"/>

  <g transform="translate(506 130)">
    <rect class="panel" x="0" y="0" width="428" height="560" rx="10"/>
    <text class="panel-title" x="214" y="44" text-anchor="middle">SIGNAL wall</text>
    <text class="body" x="214" y="74" text-anchor="middle">The communication layer that preserves UX quality.</text>

    <rect class="signal" x="48" y="112" width="150" height="76" rx="7"/>
    <text class="label" x="123" y="142" text-anchor="middle">S</text>
    <text class="small" x="123" y="166" text-anchor="middle">meaning</text>

    <rect class="signal" x="230" y="112" width="150" height="76" rx="7"/>
    <text class="label" x="305" y="142" text-anchor="middle">I</text>
    <text class="small" x="305" y="166" text-anchor="middle">intent</text>

    <rect class="signal" x="48" y="208" width="150" height="76" rx="7"/>
    <text class="label" x="123" y="238" text-anchor="middle">G</text>
    <text class="small" x="123" y="262" text-anchor="middle">evidence</text>

    <rect class="signal" x="230" y="208" width="150" height="76" rx="7"/>
    <text class="label" x="305" y="238" text-anchor="middle">N</text>
    <text class="small" x="305" y="262" text-anchor="middle">state + path</text>

    <rect class="signal" x="48" y="304" width="150" height="76" rx="7"/>
    <text class="label" x="123" y="334" text-anchor="middle">A</text>
    <text class="small" x="123" y="358" text-anchor="middle">control</text>

    <rect class="signal" x="230" y="304" width="150" height="76" rx="7"/>
    <text class="label" x="305" y="334" text-anchor="middle">L</text>
    <text class="small" x="305" y="358" text-anchor="middle">low effort</text>

    <rect class="formula" x="48" y="420" width="332" height="82" rx="8"/>
    <text class="mono" x="214" y="455" text-anchor="middle">UX = (P + wA · A) / (1 + C)</text>
    <text class="small" x="214" y="482" text-anchor="middle">raise understanding, preserve agency, reduce load</text>
  </g>

  <path class="line" d="M934 410 H1020"/>

  <g transform="translate(1036 160)">
    <rect class="panel" x="0" y="0" width="332" height="500" rx="10"/>
    <text class="panel-title" x="34" y="44">What leaves</text>
    <text class="body" x="34" y="76">The system responds with less user effort.</text>

    <rect class="output" x="34" y="112" width="264" height="288" rx="8"/>
    <text class="label" x="166" y="150" text-anchor="middle">Improved output</text>
    <text class="body-dark" x="62" y="190">clear meaning</text>
    <text class="body-dark" x="62" y="226">recognized goal</text>
    <text class="body-dark" x="62" y="262">visible grounding</text>
    <text class="body-dark" x="62" y="298">current state</text>
    <text class="body-dark" x="62" y="334">safe next step</text>
    <text class="body-dark" x="62" y="370">lower cognitive load</text>

    <text class="small" x="34" y="446">The user can understand, decide, correct,</text>
    <text class="small" x="34" y="472">or continue without fighting the interface.</text>
  </g>

  <path class="soft-line" d="M720 690 V746"/>
  <rect class="output" x="346" y="746" width="748" height="48" rx="8"/>
  <text class="label" x="720" y="777" text-anchor="middle">Useful AI behavior with visible value and fewer hidden costs</text>
</svg>
